<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | InfoBeans Private Limited</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="admin-app"></div>

<script>
'use strict';

const API_BASE = '';
const ADMIN_PASSWORD = 'gourav289';
const STORAGE_KEY = 'ib_admin_token';

function getToken() { return localStorage.getItem(STORAGE_KEY); }
function setToken(t) { localStorage.setItem(STORAGE_KEY, t); }
function clearToken() { localStorage.removeItem(STORAGE_KEY); }
function isLoggedIn() { return !!getToken(); }

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function api(path, options = {}) {
    const token = getToken();
    const headers = { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) };
    const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
    const data = await res.json();
    if (!res.ok && res.status === 401) { clearToken(); render(); }
    return data;
}

const STATUSES = ['New Lead', 'Contacted', 'In Discussion', 'Proposal Sent', 'Won', 'Lost'];

function statusClass(s) {
    const m = {
        'New Lead': 'status-new',
        'Contacted': 'status-contacted',
        'In Discussion': 'status-discussion',
        'Proposal Sent': 'status-proposal',
        'Won': 'status-won',
        'Lost': 'status-lost'
    };
    return m[s] || 'status-new';
}

function formatDate(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatCurrency(n) {
    if (n == null || isNaN(n)) return '—';
    return '₹' + Number(n).toLocaleString('en-IN');
}

async function fetchProjects(search = '', status = 'all') {
    const params = new URLSearchParams();
    if (search) params.set('search', search);
    if (status && status !== 'all') params.set('status', status);
    params.set('limit', '200');
    return api(`/api/projects?${params.toString()}`);
}

async function updateProjectStatus(id, status) {
    return api(`/api/projects/${id}`, { method: 'PUT', body: JSON.stringify({ status }) });
}

async function deleteProject(id) {
    if (!confirm('Delete this project request permanently?')) return null;
    return api(`/api/projects/${id}`, { method: 'DELETE' });
}

async function handleLogin(password) {
    const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ password }) });
    if (res.success) { setToken(res.token); render(); }
    return res.success;
}

function renderLogin() {
    document.getElementById('admin-app').innerHTML = `
        <div class="admin-db-login-screen">
            <div class="admin-db-login-card">
                <div style="width:56px;height:56px;background:linear-gradient(135deg,#c9a84c,#e8c97a);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#050c1a;">IB</div>
                <h1>InfoBeans Admin</h1>
                <p>Secure Administrator Portal</p>
                <div class="login-error-msg" id="login-error"><i data-lucide="shield-x" style="width:14px;height:14px;flex-shrink:0;"></i> Incorrect password. Please try again.</div>
                <input type="password" id="login-password" placeholder="Enter administrator password" autocomplete="off">
                <button class="btn btn-primary w-full" id="login-btn" style="justify-content:center;">Access Dashboard</button>
                <div style="margin-top:1.5rem;"><a href="index.html" style="color:#4a6080;font-size:13px;text-decoration:none;">&larr; Back to Website</a></div>
            </div>
        </div>
    `;
    document.getElementById('login-btn').addEventListener('click', async () => {
        const pw = document.getElementById('login-password').value;
        document.getElementById('login-error').classList.remove('show');
        const ok = await handleLogin(pw);
        if (!ok) {
            document.getElementById('login-error').classList.add('show');
            document.getElementById('login-password').value = '';
        }
    });
    document.getElementById('login-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

let state = { projects: [], search: '', status: 'all' };

async function renderDashboard() {
    const res = await fetchProjects(state.search, state.status);
    state.projects = res.success ? res.data : [];

    const total = state.projects.length;
    const newLeads = state.projects.filter(p => p.status === 'New Lead').length;
    const won = state.projects.filter(p => p.status === 'Won').length;
    const pipeline = state.projects.reduce((sum, p) => sum + (p.estimatedCost?.min || 0), 0);

    let rows = '';
    if (state.projects.length === 0) {
        rows = `<tr><td colspan="7"><div class="admin-db-empty">No project requests found.</div></td></tr>`;
    } else {
        state.projects.forEach(p => {
            const costMin = formatCurrency(p.estimatedCost?.min);
            const costMax = formatCurrency(p.estimatedCost?.max);
            rows += `
                <tr onclick="openDetail('${p._id}')">
                    <td><strong style="font-size:13px;">${esc(p.name)}</strong></td>
                    <td style="color:#8899b0;font-size:12px;">${esc(p.email)}</td>
                    <td>${esc(p.projectType)}</td>
                    <td>${costMin} – ${costMax}</td>
                    <td style="color:#4a6080;font-size:12px;">${formatDate(p.createdAt)}</td>
                    <td><span class="admin-db-status ${statusClass(p.status)}">${esc(p.status)}</span></td>
                    <td style="text-align:right;">
                        <select class="status-update-select" onclick="event.stopPropagation()" onchange="updateStatus('${p._id}', this.value)">
                            ${STATUSES.map(s => `<option value="${s}" ${s === p.status ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                    </td>
                </tr>
            `;
        });
    }

    const html = `
        <div class="admin-db-wrapper">
            <header class="admin-db-header">
                <a href="index.html" class="admin-db-logo">
                    <div class="admin-db-logo-icon">IB</div>
                    <div class="admin-db-logo-text"><strong>InfoBeans</strong><span>Admin Portal</span></div>
                </a>
                <div class="admin-db-user">
                    <span>${total} leads</span>
                    <button class="admin-db-logout" id="logout-btn">Logout</button>
                </div>
            </header>
            <div class="admin-db-body">
                <div class="admin-db-metrics">
                    <div class="admin-db-metric"><div class="admin-db-metric-value" style="color:#3a8ef6;">${total}</div><div class="admin-db-metric-label">Total Leads</div></div>
                    <div class="admin-db-metric"><div class="admin-db-metric-value" style="color:#f39c12;">${newLeads}</div><div class="admin-db-metric-label">New Leads</div></div>
                    <div class="admin-db-metric"><div class="admin-db-metric-value" style="color:#2ecc71;">${won}</div><div class="admin-db-metric-label">Won</div></div>
                    <div class="admin-db-metric"><div class="admin-db-metric-value" style="color:#c9a84c;">${formatCurrency(pipeline)}</div><div class="admin-db-metric-label">Pipeline Value</div></div>
                </div>
                <div class="admin-db-toolbar">
                    <div class="admin-db-search">
                        <i data-lucide="search" style="width:14px;height:14px;flex-shrink:0;"></i>
                        <input type="text" id="db-search" placeholder="Search name, email, type..." value="${esc(state.search)}">
                    </div>
                    <select class="admin-db-filter" id="db-filter">
                        <option value="all" ${state.status === 'all' ? 'selected' : ''}>All Status</option>
                        ${STATUSES.map(s => `<option value="${s}" ${state.status === s ? 'selected' : ''}>${esc(s)}</option>`).join('')}
                    </select>
                    <button class="admin-db-refresh" id="db-refresh"><i data-lucide="refresh-cw" style="width:13px;height:13px;"></i> Refresh</button>
                </div>
                <div class="admin-db-table-wrap">
                    <table class="admin-db-table">
                        <thead><tr><th>Name</th><th>Email</th><th>Project</th><th>Estimate</th><th>Date</th><th>Status</th><th style="text-align:right;">Action</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="admin-db-count">${state.projects.length} record${state.projects.length !== 1 ? 's' : ''}</div>
                </div>
            </div>
        </div>
    `;
    document.getElementById('admin-app').innerHTML = html;
    if (typeof lucide !== 'undefined') lucide.createIcons();

    document.getElementById('db-search').addEventListener('input', e => {
        state.search = e.target.value;
        renderDashboard();
    });
    document.getElementById('db-filter').addEventListener('change', e => {
        state.status = e.target.value;
        renderDashboard();
    });
    document.getElementById('db-refresh').addEventListener('click', renderDashboard);
    document.getElementById('logout-btn').addEventListener('click', () => { clearToken(); render(); });
}

async function updateStatus(id, newStatus) {
    await updateProjectStatus(id, newStatus);
    renderDashboard();
}

async function openDetail(id) {
    const res = await api(`/api/projects/${id}`);
    if (!res.success) return;
    const p = res.data;
    const costMin = formatCurrency(p.estimatedCost?.min);
    const costMax = formatCurrency(p.estimatedCost?.max);
    const featuresStr = p.features?.length ? p.features.join(', ') : 'None selected';

    const overlay = document.createElement('div');
    overlay.className = 'inquiry-modal-overlay open';
    overlay.innerHTML = `
        <div class="inquiry-modal" style="max-width:600px;">
            <button class="inquiry-modal-close" onclick="this.closest('.inquiry-modal-overlay').remove();document.body.style.overflow='';" aria-label="Close"><i data-lucide="x"></i></button>
            <div class="inquiry-modal-header" style="text-align:left;">
                <span class="section-tag font-semibold" style="font-size:11px;">Project Details</span>
                <h2 class="section-title" style="font-size:1.5rem;">${esc(p.name)}</h2>
                <span class="admin-db-status ${statusClass(p.status)}" style="margin-top:0.5rem;display:inline-block;">${esc(p.status)}</span>
            </div>
            <div style="margin-bottom:1.5rem;">
                <div style="background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.1);border-radius:10px;padding:1.25rem;margin-bottom:1rem;">
                    <h3 style="font-size:13px;color:#c9a84c;margin:0 0 0.75rem;font-weight:600;">Client Information</h3>
                    <table style="width:100%;font-size:13px;border-collapse:collapse;">
                        <tr><td style="padding:4px 0;color:#8899b0;">Email</td><td style="padding:4px 0;text-align:right;color:#f0e8d5;">${esc(p.email)}</td></tr>
                        <tr><td style="padding:4px 0;color:#8899b0;">Phone</td><td style="padding:4px 0;text-align:right;color:#f0e8d5;">${esc(p.phone)}</td></tr>
                        <tr><td style="padding:4px 0;color:#8899b0;">Business</td><td style="padding:4px 0;text-align:right;color:#f0e8d5;">${esc(p.businessName)}</td></tr>
                        <tr><td style="padding:4px 0;color:#8899b0;">Preferred Contact</td><td style="padding:4px 0;text-align:right;color:#f0e8d5;">${esc(p.communicationMethod)}</td></tr>
                        <tr><td style="padding:4px 0;color:#8899b0;">Submitted</td><td style="padding:4px 0;text-align:right;color:#4a6080;">${formatDate(p.createdAt)}</td></tr>
                    </table>
                </div>
                <div style="background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.1);border-radius:10px;padding:1.25rem;margin-bottom:1rem;">
                    <h3 style="font-size:13px;color:#c9a84c;margin:0 0 0.75rem;font-weight:600;">Project Configuration</h3>
                    <table style="width:100%;font-size:13px;border-collapse:collapse;">
                        <tr><td style="padding:4px 0;color:#8899b0;">Type</td><td style="padding:4px 0;text-align:right;color:#f0e8d5;font-weight:500;">${esc(p.projectType)}</td></tr>
                        <tr><td style="padding:4px 0;color:#8899b0;">Pages</td><td style="padding:4px 0;text-align:right;color:#f0e8d5;font-weight:500;">${p.pages}</td></tr>
                        <tr><td style="padding:4px 0;color:#8899b0;">Features</td><td style="padding:4px 0;text-align:right;color:#f0e8d5;font-weight:500;">${esc(featuresStr)}</td></tr>
                        <tr><td style="padding:4px 0;color:#8899b0;">Timeline</td><td style="padding:4px 0;text-align:right;color:#f0e8d5;font-weight:500;">${esc(p.timeline)}</td></tr>
                        <tr><td style="padding:6px 0;color:#8899b0;border-top:1px solid rgba(201,168,76,0.1);">Estimated Cost</td><td style="padding:6px 0;text-align:right;color:#c9a84c;font-weight:700;font-size:16px;border-top:1px solid rgba(201,168,76,0.1);">${costMin} – ${costMax}</td></tr>
                    </table>
                </div>
                <div style="background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.1);border-radius:10px;padding:1.25rem;">
                    <h3 style="font-size:13px;color:#c9a84c;margin:0 0 0.75rem;font-weight:600;">Project Description</h3>
                    <p style="font-size:13px;color:#8899b0;line-height:1.7;margin:0;">${esc(p.description)}</p>
                </div>
            </div>
            <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
                <select class="admin-db-filter" onchange="(async()=>{await updateStatus('${p._id}',this.value);this.closest('.inquiry-modal-overlay').remove();document.body.style.overflow='';})()" style="flex:1;">
                    ${STATUSES.map(s => `<option value="${s}" ${s === p.status ? 'selected' : ''}>${s}</option>`).join('')}
                </select>
                <button class="btn btn-secondary" onclick="this.closest('.inquiry-modal-overlay').remove();document.body.style.overflow='';" style="flex-shrink:0;">Close</button>
                <button class="btn btn-secondary" onclick="(async()=>{await deleteProject('${p._id}');this.closest('.inquiry-modal-overlay').remove();document.body.style.overflow='';renderDashboard();})()" style="flex-shrink:0;border-color:rgba(231,76,60,0.3);color:#e74c3c;">Delete</button>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
    if (typeof lucide !== 'undefined') lucide.createIcons();
    overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); document.body.style.overflow = ''; } });
}

function render() {
    if (isLoggedIn()) renderDashboard();
    else renderLogin();
}

document.addEventListener('DOMContentLoaded', () => {
    if (typeof lucide !== 'undefined') lucide.createIcons();
    render();
});
</script>
</body>
</html>
