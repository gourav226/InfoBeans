<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | InfoBeans Private Limited</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="admin-app"></div>

<script>
'use strict';

const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:8888' : '';
const STORAGE_KEY = 'ib_admin_token';
const STATUSES = ['New', 'Contacted', 'In Discussion', 'Proposal Sent', 'Won', 'Lost', 'Archived'];
const TYPES = ['all', 'project_inquiry', 'job_application', 'contact', 'quote_request'];

function getToken() { return localStorage.getItem(STORAGE_KEY); }
function setToken(t) { localStorage.setItem(STORAGE_KEY, t); }
function clearToken() { localStorage.removeItem(STORAGE_KEY); }
function isLoggedIn() { return !!getToken(); }

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function api(path, options = {}) {
    const token = getToken();
    const headers = { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) };
    try {
        const url = `${BACKEND_URL}${path}`;
        console.log('[Admin API]', options.method || 'GET', url);
        const res = await fetch(url, { ...options, headers });
        const data = await res.json();
        console.log('[Admin API] Response:', res.status, data);
        if (!res.ok && res.status === 401) { clearToken(); render(); }
        return data;
    } catch (e) {
        console.error('[Admin API] Network error:', e);
        return { success: false, message: 'Network error. Check connection.' };
    }
}

function statusClass(s) {
    const m = { 'New': 'status-new', 'Contacted': 'status-contacted', 'In Discussion': 'status-discussion', 'Proposal Sent': 'status-proposal', 'Won': 'status-won', 'Lost': 'status-lost', 'Archived': 'status-archived' };
    return m[s] || 'status-new';
}

function formatDate(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatCurrency(n) {
    if (n == null || isNaN(n)) return '—';
    return '₹' + Number(n).toLocaleString('en-IN');
}

function typeLabel(t) {
    const m = { 'project_inquiry': 'Project Inquiry', 'job_application': 'Job Application', 'contact': 'Contact', 'quote_request': 'Quote Request' };
    return m[t] || t;
}

function typeIcon(t) {
    const m = { 'project_inquiry': 'file-text', 'job_application': 'user-check', 'contact': 'mail', 'quote_request': 'clipboard-list' };
    return m[t] || 'activity';
}

let state = { leads: [], stats: null, search: '', status: 'all', type: 'all', page: 1, lastUpdate: null };
let refreshInterval = null;

async function fetchLeads() {
    const params = new URLSearchParams();
    if (state.search) params.set('search', state.search);
    if (state.status !== 'all') params.set('status', state.status);
    if (state.type !== 'all') params.set('type', state.type);
    params.set('limit', '200');
    return api(`/api/leads?${params.toString()}`);
}

async function fetchStats() {
    return api('/api/dashboard/stats');
}

async function updateLead(id, data) {
    return api(`/api/leads/${id}`, { method: 'PUT', body: JSON.stringify(data) });
}

async function deleteLead(id) {
    if (!confirm('Delete this record permanently?')) return null;
    return api(`/api/leads/${id}`, { method: 'DELETE' });
}

async function handleLogin(password) {
    const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ password }) });
    if (res.success) { setToken(res.token); render(); }
    return res.success;
}

function renderLogin() {
    document.getElementById('admin-app').innerHTML = `
        <div class="admin-db-login-screen">
            <div class="admin-db-login-card">
                <div style="width:56px;height:56px;background:linear-gradient(135deg,#c9a84c,#e8c97a);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#050c1a;">IB</div>
                <h1>InfoBeans Admin</h1>
                <p>Secure Administrator Portal</p>
                <div class="login-error-msg" id="login-error"><i data-lucide="shield-x" style="width:14px;height:14px;flex-shrink:0;"></i> Incorrect password. Please try again.</div>
                <input type="password" id="login-password" placeholder="Enter administrator password" autocomplete="off">
                <button class="btn btn-primary w-full" id="login-btn" style="justify-content:center;"><i data-lucide="log-in" class="icon-left"></i> Access Dashboard</button>
                <div style="margin-top:1.5rem;"><a href="index.html" style="color:#4a6080;font-size:13px;text-decoration:none;">&larr; Back to Website</a></div>
            </div>
        </div>
    `;
    document.getElementById('login-btn').addEventListener('click', async () => {
        const pw = document.getElementById('login-password').value;
        document.getElementById('login-error').classList.remove('show');
        const ok = await handleLogin(pw);
        if (!ok) {
            document.getElementById('login-error').classList.add('show');
            document.getElementById('login-password').value = '';
        }
    });
    document.getElementById('login-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

async function renderDashboard() {
    const [leadsRes, statsRes] = await Promise.all([fetchLeads(), fetchStats()]);
    state.leads = leadsRes.success ? leadsRes.data : [];
    state.stats = statsRes.success ? statsRes.data : null;
    state.lastUpdate = new Date();

    const s = state.stats || { totalLeads: 0, newLeads: 0, todayLeads: 0, statusBreakdown: {}, recentActivities: [] };
    const total = state.leads.length;

    let rows = '';
    if (state.leads.length === 0) {
        rows = `<tr><td colspan="7"><div class="admin-db-empty"><i data-lucide="inbox" style="width:32px;height:32px;opacity:0.3;margin-bottom:0.5rem;"></i><br>No records found.</div></td></tr>`;
    } else {
        state.leads.forEach(p => {
            const costStr = p.estimatedCost ? `${formatCurrency(p.estimatedCost.min)} – ${formatCurrency(p.estimatedCost.max)}` : '';
            const extra = p.projectType ? esc(p.projectType) : (p.role ? esc(p.role) : (p.subject ? esc(p.subject) : ''));
            rows += `
                <tr onclick="openDetail('${p._id}')" class="admin-db-row">
                    <td><strong>${esc(p.name)}</strong></td>
                    <td class="admin-db-email-col">${esc(p.email)}</td>
                    <td><span class="admin-db-type-badge type-${p.type}">${typeLabel(p.type)}</span></td>
                    <td class="admin-db-extra-col">${esc(extra)}</td>
                    <td>${costStr}</td>
                    <td class="admin-db-date-col">${formatDate(p.createdAt)}</td>
                    <td><span class="admin-db-status ${statusClass(p.status)}">${esc(p.status)}</span></td>
                    <td style="text-align:right;">
                        <select class="admin-db-status-select" onclick="event.stopPropagation()" onchange="updateLeadStatus('${p._id}', this.value)">
                            ${STATUSES.map(s => `<option value="${s}" ${s === p.status ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                    </td>
                </tr>
            `;
        });
    }

    let recentHtml = '';
    if (s.recentActivities && s.recentActivities.length > 0) {
        recentHtml = s.recentActivities.map(a => `
            <div class="admin-db-recent-item" onclick="openDetail('${a._id}')">
                <div class="admin-db-recent-icon"><i data-lucide="${typeIcon(a.type)}"></i></div>
                <div class="admin-db-recent-info">
                    <span class="admin-db-recent-name">${esc(a.name)}</span>
                    <span class="admin-db-recent-type">${typeLabel(a.type)}</span>
                </div>
                <span class="admin-db-status ${statusClass(a.status)}">${esc(a.status)}</span>
                <span class="admin-db-recent-time">${formatDate(a.createdAt)}</span>
            </div>
        `).join('');
    } else {
        recentHtml = '<div style="padding:2rem;text-align:center;color:#4a6080;font-size:13px;">No recent activities</div>';
    }

    const html = `
        <div class="admin-db-wrapper">
            <header class="admin-db-header">
                <a href="index.html" class="admin-db-logo"><div class="admin-db-logo-icon">IB</div><div class="admin-db-logo-text"><strong>InfoBeans</strong><span>Admin Portal</span></div></a>
                <div class="admin-db-header-right">
                    <span class="admin-db-last-update"><i data-lucide="clock" style="width:12px;height:12px;"></i> ${state.lastUpdate.toLocaleTimeString()}</span>
                    <button class="admin-db-header-btn" id="refresh-btn" title="Refresh"><i data-lucide="refresh-cw" style="width:14px;height:14px;"></i></button>
                    <button class="admin-db-header-btn admin-db-logout-btn" id="logout-btn" title="Logout"><i data-lucide="log-out" style="width:14px;height:14px;"></i></button>
                </div>
            </header>
            <div class="admin-db-body">
                <div class="admin-db-metrics">
                    <div class="admin-db-metric"><div class="admin-db-metric-value" style="color:#3a8ef6;">${s.totalLeads}</div><div class="admin-db-metric-label">Total Leads</div></div>
                    <div class="admin-db-metric"><div class="admin-db-metric-value" style="color:#f39c12;">${s.newLeads}</div><div class="admin-db-metric-label">New Leads</div></div>
                    <div class="admin-db-metric"><div class="admin-db-metric-value" style="color:#2ecc71;">${s.todayLeads}</div><div class="admin-db-metric-label">Today's Activity</div></div>
                    <div class="admin-db-metric"><div class="admin-db-metric-value" style="color:#e74c3c;">${s.statusBreakdown.Won || 0}</div><div class="admin-db-metric-label">Won</div></div>
                </div>
                <div class="admin-db-main-grid">
                    <div class="admin-db-table-section">
                        <div class="admin-db-toolbar">
                            <div class="admin-db-search"><i data-lucide="search" style="width:14px;height:14px;flex-shrink:0;"></i><input type="text" id="db-search" placeholder="Search name, email, business, type..." value="${esc(state.search)}"></div>
                            <select class="admin-db-filter" id="db-type-filter"><option value="all" ${state.type === 'all' ? 'selected' : ''}>All Types</option>${['project_inquiry','job_application','contact','quote_request'].map(t => `<option value="${t}" ${state.type === t ? 'selected' : ''}>${typeLabel(t)}</option>`).join('')}</select>
                            <select class="admin-db-filter" id="db-status-filter"><option value="all" ${state.status === 'all' ? 'selected' : ''}>All Status</option>${STATUSES.map(s => `<option value="${s}" ${state.status === s ? 'selected' : ''}>${esc(s)}</option>`).join('')}</select>
                        </div>
                        <div class="admin-db-table-wrap">
                            <table class="admin-db-table">
                                <thead><tr><th>Name</th><th>Email</th><th>Type</th><th>Detail</th><th>Estimate</th><th>Date</th><th>Status</th><th style="text-align:right;">Action</th></tr></thead>
                                <tbody>${rows}</tbody>
                            </table>
                            <div class="admin-db-count">${state.leads.length} record${state.leads.length !== 1 ? 's' : ''}</div>
                        </div>
                    </div>
                    <div class="admin-db-recent-section">
                        <div class="admin-db-recent-header"><i data-lucide="activity" style="width:14px;height:14px;"></i> Recent Activities</div>
                        <div class="admin-db-recent-list">${recentHtml}</div>
                    </div>
                </div>
            </div>
        </div>
    `;
    document.getElementById('admin-app').innerHTML = html;
    if (typeof lucide !== 'undefined') lucide.createIcons();
    bindEvents();
    startAutoRefresh();
}

function bindEvents() {
    const searchEl = document.getElementById('db-search');
    if (searchEl) {
        searchEl.addEventListener('input', e => { state.search = e.target.value; state.page = 1; renderDashboard(); });
    }
    const typeFilter = document.getElementById('db-type-filter');
    if (typeFilter) {
        typeFilter.addEventListener('change', e => { state.type = e.target.value; state.page = 1; renderDashboard(); });
    }
    const statusFilter = document.getElementById('db-status-filter');
    if (statusFilter) {
        statusFilter.addEventListener('change', e => { state.status = e.target.value; state.page = 1; renderDashboard(); });
    }
    const refreshBtn = document.getElementById('refresh-btn');
    if (refreshBtn) refreshBtn.addEventListener('click', renderDashboard);
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) logoutBtn.addEventListener('click', () => { clearToken(); stopAutoRefresh(); render(); });
}

function startAutoRefresh() {
    stopAutoRefresh();
    refreshInterval = setInterval(renderDashboard, 15000);
}

function stopAutoRefresh() {
    if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
}

async function updateLeadStatus(id, newStatus) {
    await updateLead(id, { status: newStatus });
    renderDashboard();
}

async function openDetail(id) {
    const res = await api(`/api/leads/${id}`);
    if (!res.success) return;
    const p = res.data;
    const costMin = formatCurrency(p.estimatedCost?.min);
    const costMax = formatCurrency(p.estimatedCost?.max);
    const featuresStr = p.features?.length ? p.features.join(', ') : 'None selected';

    let detailRows = '';
    if (p.type === 'project_inquiry') {
        detailRows = `
            <tr><td>Business</td><td>${esc(p.businessName || '—')}</td></tr>
            <tr><td>Phone</td><td>${esc(p.phone || '—')}</td></tr>
            <tr><td>Preferred Contact</td><td>${esc(p.communicationMethod || '—')}</td></tr>
            <tr><td>Project Type</td><td>${esc(p.projectType || '—')}</td></tr>
            <tr><td>Pages</td><td>${p.pages || '—'}</td></tr>
            <tr><td>Features</td><td>${esc(featuresStr)}</td></tr>
            <tr><td>Timeline</td><td>${esc(p.timeline || '—')}</td></tr>
        `;
    } else if (p.type === 'job_application') {
        detailRows = `
            <tr><td>Phone</td><td>${esc(p.phone || '—')}</td></tr>
            <tr><td>Role</td><td>${esc(p.role || '—')}</td></tr>
            <tr><td>Resume</td><td>${p.resumeData ? `<a href="${esc(p.resumeData)}" download="${esc(p.resumeName)}" style="color:#c9a84c;">Download ${esc(p.resumeName)} (${esc(p.resumeSize) || ''})</a>` : 'No file'}</td></tr>
        `;
    } else if (p.type === 'contact') {
        detailRows = `
            <tr><td>Phone</td><td>${esc(p.phone || '—')}</td></tr>
            <tr><td>Subject</td><td>${esc(p.subject || '—')}</td></tr>
        `;
    } else if (p.type === 'quote_request') {
        detailRows = `
            <tr><td>Business</td><td>${esc(p.businessName || '—')}</td></tr>
            <tr><td>Phone</td><td>${esc(p.phone || '—')}</td></tr>
            <tr><td>Service</td><td>${esc(p.serviceType || '—')}</td></tr>
            <tr><td>Package</td><td>${esc(p.packageName || '—')}</td></tr>
        `;
    }

    const overlay = document.createElement('div');
    overlay.className = 'inquiry-modal-overlay open';
    overlay.innerHTML = `
        <div class="inquiry-modal" style="max-width:640px;">
            <button class="inquiry-modal-close" onclick="this.closest('.inquiry-modal-overlay').remove();document.body.style.overflow='';" aria-label="Close"><i data-lucide="x"></i></button>
            <div class="inquiry-modal-header" style="text-align:left;">
                <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
                    <span class="admin-db-type-badge type-${p.type}">${typeLabel(p.type)}</span>
                    <span class="admin-db-status ${statusClass(p.status)}">${esc(p.status)}</span>
                </div>
                <h2 class="section-title" style="font-size:1.4rem;margin:0;">${esc(p.name)}</h2>
            </div>
            <div style="margin-bottom:1.5rem;">
                <div class="admin-db-detail-card">
                    <h3>Contact Information</h3>
                    <table>
                        <tr><td>Email</td><td><a href="mailto:${esc(p.email)}" style="color:#c9a84c;">${esc(p.email)}</a></td></tr>
                        ${detailRows}
                        <tr><td>Source</td><td>${esc(p.source || 'Direct')}</td></tr>
                        <tr><td>Submitted</td><td style="color:#4a6080;">${formatDate(p.createdAt)}</td></tr>
                    </table>
                </div>
                ${p.type === 'project_inquiry' && (p.estimatedCost?.min != null) ? `
                <div class="admin-db-detail-card">
                    <h3>Estimated Budget</h3>
                    <div style="font-size:1.4rem;font-weight:700;color:#c9a84c;">${costMin} – ${costMax}</div>
                </div>` : ''}
                ${p.description ? `
                <div class="admin-db-detail-card">
                    <h3>Description</h3>
                    <p style="font-size:13px;color:#8899b0;line-height:1.7;margin:0;">${esc(p.description)}</p>
                </div>` : ''}
                ${p.message ? `
                <div class="admin-db-detail-card">
                    <h3>Message</h3>
                    <p style="font-size:13px;color:#8899b0;line-height:1.7;margin:0;">${esc(p.message)}</p>
                </div>` : ''}
                ${p.note ? `
                <div class="admin-db-detail-card">
                    <h3>Cover Note</h3>
                    <p style="font-size:13px;color:#8899b0;line-height:1.7;margin:0;">${esc(p.note)}</p>
                </div>` : ''}
                <div class="admin-db-detail-card">
                    <h3>Activity Log</h3>
                    <table>
                        <tr><td>Created</td><td style="color:#4a6080;">${formatDate(p.createdAt)}</td></tr>
                        <tr><td>Last Updated</td><td style="color:#4a6080;">${formatDate(p.updatedAt)}</td></tr>
                    </table>
                </div>
            </div>
            <div style="display:flex;gap:0.75rem;flex-wrap:wrap;">
                <select class="admin-db-filter" onchange="(async()=>{await updateLead('${p._id}',{status:this.value});this.closest('.inquiry-modal-overlay').remove();document.body.style.overflow='';renderDashboard();})()" style="flex:1;">
                    ${STATUSES.map(s => `<option value="${s}" ${s === p.status ? 'selected' : ''}>${s}</option>`).join('')}
                </select>
                <button class="btn btn-secondary" onclick="this.closest('.inquiry-modal-overlay').remove();document.body.style.overflow='';" style="flex-shrink:0;">Close</button>
                <button class="btn btn-secondary" onclick="(async()=>{await deleteLead('${p._id}');this.closest('.inquiry-modal-overlay').remove();document.body.style.overflow='';renderDashboard();})()" style="flex-shrink:0;border-color:rgba(231,76,60,0.3);color:#e74c3c;">Delete</button>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
    if (typeof lucide !== 'undefined') lucide.createIcons();
    overlay.addEventListener('click', e => { if (e.target === overlay) { overlay.remove(); document.body.style.overflow = ''; } });
}

function render() {
    stopAutoRefresh();
    if (isLoggedIn()) renderDashboard();
    else renderLogin();
}

document.addEventListener('DOMContentLoaded', () => {
    if (typeof lucide !== 'undefined') lucide.createIcons();
    render();
});
</script>
</body>
</html>
